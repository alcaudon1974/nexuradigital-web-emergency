server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 187.33.159.38 _;
    return 404;
}

server {
    listen 80;
    listen [::]:80;
    server_name nexuradigital.es www.nexuradigital.es;
    return 301 https://nexuradigital.es$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.nexuradigital.es;

    ssl_certificate /etc/letsencrypt/live/nexuradigital.es/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nexuradigital.es/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://nexuradigital.es$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name nexuradigital.es;

    root /var/www/nexuradigital.es;
    index index.html;

    access_log /var/log/nginx/nexuradigital.es.access.log;
    error_log /var/log/nginx/nexuradigital.es.error.log;

    ssl_certificate /etc/letsencrypt/live/nexuradigital.es/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nexuradigital.es/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    location / {
        try_files $uri $uri/ =404;
    }

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location ~* \.(?:html)$ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
    }

    location ~* \.(?:txt|xml)$ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|webp|avif)$ {
        expires 30d;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }
}
